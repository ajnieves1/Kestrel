# The wrapper node named mavros_node reads the fcu url and builds the router
mavros_node:
  ros__parameters:
    fcu_url: udp://:14550@

safety_guard:
  ros__parameters:
    geofence_radius_m: 100.0
    battery_floor_percent: 25.0

# Marker world positions for scoring later, no node reads this yet
ground_truth:
  ros__parameters:
    marker_0_position: [16.66, 0.0, 5.0]
    marker_1_position: [15.0, 1.66, 10.0]
    marker_2_position: [13.34, 0.0, 15.0]
    marker_3_position: [15.0, -1.66, 20.0]

defect_detector:
  ros__parameters:
    marker_size_m: 0.5
    inference_rate_hz: 5.0
    consecutive_frames_required: 5
    photo_directory: reports/current/photos
    detector_backend: yolo
    confidence_threshold: 0.5
    dedupe_radius_m: 3.0
    model_path: models/vision/defect.onnx
    assumed_depth_m: 6.5

mission_director:
  ros__parameters:
    structure_center_north: 15.0
    structure_center_east: 0.0
    structure_height: 22.0
    survey_orbit_radius: 8.0
    survey_climb_step: 5.0
    investigate_orbit_radius: 4.0
    investigate_waypoint_count: 8
    return_altitude: 5.0
    transit_altitude: 0.0
    auto_start: true

report_writer:
  ros__parameters:
    llm_provider: claude
    llm_model: ""
    site_name: pylon

health_monitor:
  ros__parameters:
    model_path: models/health/health_model.onnx
    scaler_path: models/health/health_scaler.json
    consecutive_alerts_required: 8
