# The wrapper node named mavros_node reads the fcu url and builds the router
mavros_node:
  ros__parameters:
    fcu_url: udp://:14550@

safety_guard:
  ros__parameters:
    geofence_radius_m: 100.0
    battery_floor_percent: 25.0

# Marker world positions for scoring later, no node reads this yet
ground_truth:
  ros__parameters:
    marker_0_position: [16.66, 0.0, 5.0]
    marker_1_position: [15.0, 1.66, 10.0]
    marker_2_position: [13.34, 0.0, 15.0]
    marker_3_position: [15.0, -1.66, 20.0]

defect_detector:
  ros__parameters:
    marker_size_m: 0.5
    inference_rate_hz: 5.0
    consecutive_frames_required: 5
    photo_directory: reports/current/photos
