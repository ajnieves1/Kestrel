name: ci

on: push

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    outputs:
      image_repo: ${{ steps.repo.outputs.repo }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Compute the lowercase image repository name
        id: repo
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Free disk space for the large ROS and Gazebo image
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.repo }}/kestrel-dev:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ steps.repo.outputs.repo }}/kestrel-dev:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.repo.outputs.repo }}/kestrel-dev:buildcache,mode=max

  build:
    needs: image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ needs.image.outputs.image_repo }}/kestrel-dev:${{ github.sha }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      # The image runs as ubuntu by default, checkout needs root to write
      # its state files into the runner temp directory
      options: --user root
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Build and test the workspace
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build --event-handlers console_cohesion+
          # A package with no tests yet makes pytest exit 5, gate on the results
          colcon test || true
          colcon test-result --verbose

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .
